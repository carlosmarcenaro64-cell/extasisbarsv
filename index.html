<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marceprint3D | Llaveros y Figuras</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- EL ESTILO Y LAS ANIMACIONES ESTÁN AQUÍ --- */
        :root {
            --pastel-pink: #ffafcc;
            --pastel-blue: #a2d2ff;
            --accent: #ff5d8f;
            --dark: #2d3436;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animación de entrada para el título */
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Animación de flotación para las tarjetas */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .header {
            background: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            animation: bounceIn 0.8s ease-out;
        }

        .header h1 { color: var(--dark); font-size: 2.5rem; margin: 0; }
        .header span { color: var(--accent); }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 50px 10%;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            animation: float 4s ease-in-out infinite;
        }

        /* Cada tarjeta tiene un pequeño retraso en su animación de flotar */
        .card:nth-child(2) { animation-delay: 0.5s; }
        .card:nth-child(3) { animation-delay: 1s; }

        .card:hover {
            transform: scale(1.05) !important;
            border-color: var(--pastel-blue);
            box-shadow: 0 15px 30px rgba(162, 210, 255, 0.3);
        }

        .img-placeholder {
            width: 100%;
            height: 200px;
            background: #f1f2f6;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 3rem;
        }

        .price {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--dark);
            margin: 15px 0;
            display: block;
        }

        .btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 93, 143, 0.4);
        }

        .category-tag {
            display: inline-block;
            padding: 5px 15px;
            background: var(--pastel-pink);
            border-radius: 15px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: white;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>Marce<span>Print</span>3D</h1>
        <p>Cosas geniales impresas capa por capa</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="category-tag">Llaveros</div>
            <div class="img-placeholder">🦈</div>
            <h3>Tiburón Articulado</h3>
            <p>Se mueve como uno real, ¡pero es de plástico!</p>
            <span class="price">$4.50</span>
            <button class="btn">¡Lo quiero!</button>
        </div>

        <div class="card">
            <div class="category-tag">Decoración</div>
            <div class="img-placeholder">🌵</div>
            <h3>Maceta Low Poly</h3>
            <p>El hogar perfecto para tus suculentas.</p>
            <span class="price">$8.00</span>
            <button class="btn">¡Lo quiero!</button>
        </div>

        <div class="card">
            <div class="category-tag">Gaming</div>
            <div class="img-placeholder">🎮</div>
            <h3>Soporte Control</h3>
            <p>No más controles tirados por ahí.</p>
            <span class="price">$12.00</span>
            <button class="btn">¡Lo quiero!</button>
        </div>
    </div>

</body>
</html>
